<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nebula Core HUD</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="crosshair">+</div>

    <div class="hud">

        <!-- Top Section -->
        <div class="top-bar">

            <div class="stats">

                <div class="bar">
                    <span>❤️ Health</span>

                    <div class="progress">
                        <div class="fill health"></div>
                    </div>
                </div>

                <div class="bar">
                    <span>💧 Mana</span>

                    <div class="progress">
                        <div class="fill mana"></div>
                    </div>
                </div>

                <div class="bar">
                    <span>⚡ Stamina</span>

                    <div class="progress">
                        <div class="fill stamina"></div>
                    </div>
                </div>

            </div>

            <div class="player-info">

                <h2>Score</h2>
                <h1>12,450</h1>

                <p>Level 15</p>

            </div>

        </div>

        <!-- Middle Section -->
        <div class="middle">

            <div class="minimap">

                <h2>Mini Map</h2>

            </div>

        </div>

        <!-- Bottom Section -->
        <div class="bottom">

            <div class="inventory">

                <h2>Inventory</h2>

                <div class="slots">

                    <div class="slot">🗡️</div>
                    <div class="slot">🛡️</div>
                    <div class="slot">🏹</div>
                    <div class="slot">💎</div>
                    <div class="slot">🧪</div>
                    <div class="slot">🥾</div>

                </div>

            </div>

            <div class="quest">

                <h2>Current Quest</h2>

                <p>Find the Ancient Crystal</p>

                <div class="bar">

                    <span>XP</span>

                    <div class="progress">
                        <div class="fill xp"></div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
